services:
  mongo:
    image: mongo:7
    container_name: glow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: glow-server
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://host.docker.internal:27017/modern_b2c_ecommerce
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: glow-client
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"

volumes:
  mongo-data:
