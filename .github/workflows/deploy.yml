name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Quantrihethongthongtin_web
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            
            # Start MongoDB via Docker (in case docker-compose is missing)
            sudo docker run -d -p 27017:27017 --name glow-mongo mongo:7 || sudo docker start glow-mongo || true
            
            cd client
            npm install
            npm run build
            
            cd ../server
            npm install
            pm2 delete "ecommerce-api" || true
            pm2 start server.js --name "ecommerce-api"
