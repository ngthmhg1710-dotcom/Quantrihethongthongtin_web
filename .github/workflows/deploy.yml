name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Quantrihethongthongtin_web
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            
            # Install and start MongoDB natively in case Docker is not available
            sudo apt-get update || true
            sudo apt-get install -y mongodb || true
            sudo systemctl start mongodb || true
            sudo systemctl enable mongodb || true
            
            cd client
            npm install
            npm run build
            
            cd ../server
            npm install
            pm2 start server.js --name "ecommerce-api" --update-env || pm2 restart "ecommerce-api" --update-env
