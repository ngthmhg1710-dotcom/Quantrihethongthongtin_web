name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/Quantrihethongthongtin_web"; fi
            cd "$APP_DIR"

            git fetch origin main
            git reset --hard origin/main
            # Không xóa .env trên máy chủ (thường không commit)
            git clean -fd --exclude=server/.env --exclude=client/.env --exclude='*.env'

            # MongoDB (bỏ qua nếu đã chạy hoặc dùng Mongo Atlas / compose khác)
            if ! sudo docker ps --format '{{.Names}}' 2>/dev/null | grep -q '^glow-mongo$'; then
              sudo docker run -d -p 27017:27017 --name glow-mongo mongo:7 2>/dev/null || sudo docker start glow-mongo 2>/dev/null || true
            fi
            
            # Stop any conflicting docker containers that might have been started manually
            sudo docker stop glow-server glow-client 2>/dev/null || true
            sudo docker rm glow-server glow-client 2>/dev/null || true

            pm2 delete ecommerce-api ecommerce-frontend 2>/dev/null || true

            echo ">>> Build client (cài serve — phục vụ dist, tránh vite preview / npx trên PM2)"
            cd client
            npm ci || npm install
            npm run build

            echo ">>> Install server deps"
            cd ../server
            npm ci || npm install

            cd "$APP_DIR"
            sudo fuser -k 5173/tcp 2>/dev/null || true
            sudo fuser -k 5000/tcp 2>/dev/null || true
            pm2 start ecosystem.config.cjs
            pm2 save || true

            echo ">>> Reload Nginx (nếu có)"
            sudo nginx -t 2>/dev/null && sudo systemctl reload nginx 2>/dev/null || true
